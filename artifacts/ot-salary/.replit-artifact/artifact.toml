kind = "web"
previewPath = "/"
title = "OT & Salary Calculator"
version = "1.0.0"
id = "artifacts/ot-salary"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18703

[services.development]
run = "pnpm --filter @workspace/ot-salary run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ot-salary", "run", "build" ]
publicDir = "artifacts/ot-salary/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18703"
BASE_PATH = "/"
